<!DOCTYPE html>
<html>
<head>
    <title>Cancer Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🧠 AI Cancer Detection</h1>
    <p class="subtitle">Upload or paste a medical image</p>

    <form action="/predict" method="post" enctype="multipart/form-data" onsubmit="showLoader()">
        <input type="file" name="file" accept="image/*" onchange="previewImage(event)">
        <button type="submit">🔍 Analyze</button>
    </form>

    <p class="paste-info">📋 Or press Ctrl + V to paste image</p>

    <img id="preview">

    <div id="loading">🔄 Processing...</div>

    {% if warning %}
        <div class="warning">{{ warning }}</div>
    {% endif %}

    {% if prediction %}
        <div class="result-box">
            <h2 style="color: {{ color }}">{{ prediction }}</h2>

            <div class="bar">
                <div class="fill" style="width: {{ prob }}%; background: {{ color }}"></div>
            </div>

            <p>{{ prob }}% confidence</p>

            <button onclick="location.href='/'">🔄 Try Again</button>
        </div>
    {% endif %}

</div>

<script>
function previewImage(event) {
    const img = document.getElementById('preview');
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}

// 🔥 PASTE IMAGE SUPPORT
document.addEventListener("paste", function (event) {
    const items = event.clipboardData.items;

    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            const file = items[i].getAsFile();

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);

            document.querySelector('input[type="file"]').files = dataTransfer.files;

            previewImage({target: {files: [file]}});
        }
    }
});

function showLoader() {
    document.getElementById('loading').style.display = "block";
}
</script>

</body>
</html>
